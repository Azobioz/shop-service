ktor {
    environment = "test"
    deployment {
        port = 8080
    }
}

database {
    url = ${?DATABASE_URL}
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 5
}

redis {
    host = ${?REDIS_HOST}
    port = ${?REDIS_PORT}
    password = ""
}

testcontainers.reuse.enable=false

kafka {
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
    groupId = "order-service-test"
    topic = "order-events-test"
}

jwt {
    secret = "testsecret"
    issuer = "test"
    audience = "test"
    realm = "test"
    expiration = 3600000
}