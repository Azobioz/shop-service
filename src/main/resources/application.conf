ktor {
    environment = "dev"
    deployment {
        port = 8080
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/mydb"
    user = "user"
    password = "password"
    maxPoolSize = 10
}

redis {
    host = "localhost"
    port = 6379
    password = ""
}

kafka {
    bootstrapServers = "localhost:9092"
    groupId = "order-service"
    topic = "order-events"
}

jwt {
    secret = "mysecretkey"
    issuer = "myapp"
    audience = "myapp-users"
    realm = "myapp"
    expiration = 86400000 # 1 день в миллисекундах
}